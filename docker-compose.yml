services:

  traefik:
    image: docker.io/traefik
    command:
      - '--api.dashboard=true'
      - '--api.insecure=false'
      - '--certificatesresolvers.letsencrypt.acme.email=postmaster@e-hacking.de'
      - '--certificatesresolvers.letsencrypt.acme.storage=/letsencrypt/acme.json'
      - '--certificatesresolvers.letsencrypt.acme.dnschallenge=true'
      - '--certificatesresolvers.letsencrypt.acme.dnschallenge.provider=cloudflare'
      - '--certificatesresolvers.letsencrypt.acme.dnschallenge.resolvers=1.1.1.1:53,8.8.8.8:53'
      - '--entrypoints.web.address=:${PORT_HTTP}'
      - '--entrypoints.web.http.sanitizePath=false'
      - '--entrypoints.websecure.address=:${PORT_HTTPS}'
      - '--entrypoints.websecure.http.sanitizePath=false'
      - '--entrypoints.websecure.http.tls=true'
      - '--entrypoints.tcpsecure.address=:${PORT_TCP}'  # ← Separater Port für TCP
      - '--providers.docker=true'
      - '--providers.file.directory=/etc/traefik/dynamic'
      - '--providers.file.watch=true'
      #- "--certificatesresolvers.letsencrypt.acme.caserver=https://acme-staging-v02.api.letsencrypt.org/directory"
    ports:
      - "${PORT_HTTP}:${PORT_HTTP}"
      - "${PORT_HTTPS}:${PORT_HTTPS}"
      - "${PORT_TCP}:${PORT_TCP}"
    env_file:
      - cloudflare.env
    volumes:
      - "letsencrypt:/letsencrypt"
      - "./traefik/dynamic:/etc/traefik/dynamic:ro"
      - "/var/run/docker.sock:/var/run/docker.sock:ro"
    restart: on-failure
    networks:
      - ehacking
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.dashboard.rule=Host(`${DASHBOARD_HOST}`)'
      - 'traefik.http.routers.dashboard.entrypoints=websecure'
      - 'traefik.http.routers.dashboard.tls=true'
      - 'traefik.http.routers.dashboard.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.dashboard.service=api@internal'
      - 'traefik.http.routers.dashboard.middlewares=basicauth@file'

# root module: lading page with all available modules for selection
  root:
    image: ghcr.io/ehacking-websec/ehacking/root:latest
    depends_on:
      traefik:
        required: true
        condition: service_started
    env_file:
      - .env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.root.entrypoints=websecure'
      - 'traefik.http.routers.root.rule=(Host(`${HOST1}`) || Host(`${HOST2}`))'
      - 'traefik.http.routers.root.tls=true'
      - 'traefik.http.routers.root.tls.certresolver=letsencrypt'
      - 'traefik.http.routers.root.priority=1'
      - 'traefik.http.services.root.loadbalancer.server.port=80'
    restart: on-failure
    networks:
      - ehacking

# JSON module
  json-sec:
    image: ghcr.io/ehacking-websec/ehacking/json-sec
    depends_on:
      traefik:
        required: true
        condition: service_started
    env_file:
      - .env
      - flags_json-sec.env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.json-sec.entrypoints=websecure'
      - 'traefik.http.routers.json-sec.rule=(Host(`${JSON_HOST}`) && PathPrefix(`${BASE_PATH_JSON}`))'
      - 'traefik.http.routers.json-sec.tls=true'
      - 'traefik.http.routers.json-sec.tls.certresolver=letsencrypt'
      - 'traefik.http.services.json-sec.loadbalancer.server.port=80'
    restart: on-failure
    networks:
      - ehacking

# OpenID Connect module
  oidc:
    image: ghcr.io/ehacking-websec/ehacking/oidc
    depends_on:
      traefik:
        required: true
        condition: service_started
    env_file:
      - .env
      - path: credentials.env
        required: false
      - flags_oidc.env
    environment:
      # Internal address of the victim-bot service. BotProxyServlet relays
      # /__bot-proxy/* POSTs from the student's browser to this host so the
      # bot endpoint stays same-origin and the bot's hostname is not leaked
      # into the rendered page source.
      - BOT_URL=http://victim-bot:1338
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.oidc.entrypoints=websecure'
      - 'traefik.http.routers.oidc.rule=( (Host(`${SP_HOST}`) && PathPrefix(`${BASE_PATH_OIDC_SP}`)) || (Host(`${SPA_HOST}`) && PathPrefix(`${BASE_PATH_OIDC_SP}`)) || (Host(`${IDP_HOST}`) && PathPrefix(`${BASE_PATH_OIDC_IDP}`)) || (Host(`${RS_HOST}`) && PathPrefix(`${BASE_PATH_OIDC_IDP}`)) )'
      - 'traefik.http.routers.oidc.tls=true'
      - 'traefik.http.routers.oidc.tls.certresolver=letsencrypt'
      - 'traefik.http.services.oidc.loadbalancer.server.port=80'
    restart: on-failure
    networks:
      - ehacking
    links:
      - traefik:${SP_HOST}
      - traefik:${SPA_HOST}
      - traefik:${IDP_HOST}
      - traefik:${RS_HOST}
      - traefik:${CATCHER_HOST}

# REST module
  rest-api-sec:
    image: ghcr.io/ehacking-websec/ehacking/rest-api-sec
    depends_on:
      traefik:
        required: true
        condition: service_started
    ports:
      - 30003:8787
    env_file:
      - .env
      - flags_rest-api-sec.env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.rest-api-sec.entrypoints=websecure'
      - 'traefik.http.routers.rest-api-sec.rule=(Host(`${REST_HOST}`) && PathPrefix(`${BASE_PATH_REST}`))'
      - 'traefik.http.routers.rest-api-sec.tls=true'
      - 'traefik.http.routers.rest-api-sec.tls.certresolver=letsencrypt'
      - 'traefik.http.services.rest-api-sec.loadbalancer.server.port=80'
    restart: on-failure
    networks:
      - ehacking

  couchdb:
    image: docker.io/couchdb:latest
    environment:
      COUCHDB_USER: "root"
      COUCHDB_PASSWORD: "super_secure"
    restart: on-failure
    networks:
      - ehacking
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"

# SAML module
  saml:
    image: ghcr.io/ehacking-websec/ehacking/saml
    depends_on:
      traefik:
        required: true
        condition: service_started
    ports:
      - 30004:8787
    env_file:
      - .env
      - path: credentials.env
        required: false
      - flags_saml.env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.saml.entrypoints=websecure'
      - 'traefik.http.routers.saml.rule= (Host(`${SP_HOST}`) && PathPrefix(`/sp`)) || (Host(`${IDP_HOST}`) && PathPrefix(`/idp`))'
      - 'traefik.http.routers.saml.tls=true'
      - 'traefik.http.routers.saml.tls.certresolver=letsencrypt'
      - 'traefik.http.services.saml.loadbalancer.server.port=80'
    restart: on-failure
    networks:
      - ehacking
    links:
      - traefik:${SP_HOST}
      - traefik:${IDP_HOST}
      - traefik:${CATCHER_HOST}

# SOAP module:
  soap-sec:
    image: ghcr.io/ehacking-websec/ehacking/soap-sec
    depends_on:
      traefik:
        required: true
        condition: service_started
      axis2-flag:
        required: true
        condition: service_started
      axis2-fake:
        required: true
        condition: service_started
    ports:
      - 30007:8787
    env_file:
      - .env
      - flags_soap-sec.env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.soap-sec.entrypoints=websecure'
      - 'traefik.http.routers.soap-sec.rule=(Host(`${SOAP_HOST}`))'
      - 'traefik.http.routers.soap-sec.tls=true'
      - 'traefik.http.routers.soap-sec.tls.certresolver=letsencrypt'
      - 'traefik.http.services.soap-sec.loadbalancer.server.port=80'
    restart: on-failure
    networks:
      - ehacking
      - soap-internal

# SOAP module: real flag service (private network only)
  axis2-flag:
    image: ghcr.io/ehacking-websec/ehacking/axis2-flag:latest
    env_file:
      - flags_axis2-flag.env
    restart: on-failure
    networks:
      - soap-internal
    expose:
      - "8080"

# SOAP module: fake-flag service (publicly available)
  axis2-fake:
    image: ghcr.io/ehacking-websec/ehacking/axis2-flag:latest
    depends_on:
      traefik:
        required: true
        condition: service_started
    restart: on-failure
    networks:
      - ehacking
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.axis2-fake.entrypoints=websecure'
      - 'traefik.http.routers.axis2-fake.rule=(Host(`${SOAP_HOST}`) && PathPrefix(`/axis2/services/`))'
      - 'traefik.http.routers.axis2-fake.priority=10000'
      - "traefik.http.routers.axis2-fake.tls.certresolver=letsencrypt"
      - 'traefik.http.services.axis2-fake.loadbalancer.server.port=8080'


# Web security module
  web-sec:
    image: ghcr.io/ehacking-websec/ehacking/web-sec
    depends_on:
      traefik:
        required: true
        condition: service_started
    env_file:
      - .env
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.web-sec.entrypoints=websecure'
      - 'traefik.http.routers.web-sec.rule=(Host(`${WEBSEC_HOST}`) && PathPrefix(`${BASE_PATH_WEBSEC}`))'
      - 'traefik.http.routers.web-sec.tls=true'
      - 'traefik.http.routers.web-sec.tls.certresolver=letsencrypt'
      - 'traefik.http.services.web-sec.loadbalancer.server.port=80'
    restart: on-failure
    networks:
      - ehacking

# XML module
  xml-sec:
    image: ghcr.io/ehacking-websec/ehacking/xml-sec
    depends_on:
      traefik:
        required: true
        condition: service_started
    env_file:
      - .env
      - flags_xml-sec.env
    volumes:
      - "./flag_xxe1.txt:/etc/flag_xxe1.txt:ro"
      - "./flag_xxe2.txt:/etc/flag_xxe2.txt:ro"
      - "./flag_xslt1.xml:/etc/flag_xslt1.xml:ro"
    labels:
      - 'traefik.enable=true'
      - 'traefik.http.routers.xml-sec.entrypoints=websecure'
      - 'traefik.http.routers.xml-sec.rule=(Host(`${XML_HOST}`) && PathPrefix(`/xml-sec`))'
      - 'traefik.http.routers.xml-sec.tls=true'
      - 'traefik.http.routers.xml-sec.tls.certresolver=letsencrypt'
      - 'traefik.http.services.xml-sec.loadbalancer.server.port=80'
    restart: on-failure
    networks:
      - ehacking
  # Catcher / Attacker service
  catcher:
    image: ghcr.io/ehacking-websec/ehacking/catcher:latest
    pull_policy: always
    depends_on:
      - traefik
    env_file:
      - .env
      - path: credentials.env
        required: false
    environment:
      - PORT=3000
      - CATCHER_DB_PATH=/data/registry.db
      - CATCHER_PUBLIC_PORT=${PORT_HTTPS}
    volumes:
      - catcher-data:/data
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.catcher.entrypoints=websecure"
      - "traefik.http.routers.catcher.rule=Host(`${CATCHER_HOST}`) || HostRegexp(`^.+\\.${CATCHER_HOST}$$`)"
      - "traefik.http.routers.catcher.tls=true"
      - "traefik.http.routers.catcher.tls.certresolver=letsencrypt"
      # DNS-01 issues a wildcard cert covering every per-salt subdomain in
      # one go — no per-host links: dance like the local-dev stack needs.
      - "traefik.http.routers.catcher.tls.domains[0].main=${CATCHER_HOST}"
      - "traefik.http.routers.catcher.tls.domains[0].sans=*.${CATCHER_HOST}"
      - "traefik.http.services.catcher.loadbalancer.server.port=3000"
    restart: on-failure
    networks:
      - ehacking
    # links:
      # Outbound: catcher's mSP template POSTs token-exchange / userinfo
      # requests at the honest IdP. Alias the bare host so SNI carries the
      # right name into step-ca-issued certs at the IdP.
      # - traefik:${IDP_HOST}

  # Victim-bot
  victim-bot:
    image: ghcr.io/ehacking-websec/ehacking/victim-bot:latest
    pull_policy: always
    init: true
    depends_on:
      - oidc
    env_file:
      - .env
      - path: credentials.env
        required: false
      - flags_oidc.env
    environment:
      - PORT=1338
      - BOT_REPORT_RATE_LIMIT=${BOT_REPORT_RATE_LIMIT:-6}
      - OEMMES_USERNAME=oemmes
      - USER307_USERNAME=user307
      - BOT_OIDC_LOGIN_URL=https://${IDP_HOST}:${PORT_HTTPS}${BASE_PATH_OIDC_IDP}/login.xhtml
      - BOT_OIDC_LOGGED_IN_PROBE=https://${IDP_HOST}:${PORT_HTTPS}${BASE_PATH_OIDC_IDP}/index.xhtml
      - BOT_OIDC_ALLOWED_ORIGINS=https://${SP_HOST}:${PORT_HTTPS},https://${SPA_HOST}:${PORT_HTTPS},https://${IDP_HOST}:${PORT_HTTPS},https://${CATCHER_HOST}:${PORT_HTTPS}
      - BOT_OIDC_ALLOWED_ATTACKS=secure:or-1,secure:or-2,secure:or-3,secure:or-4,secure:redir-2,secure:cr-1,secure:xss-1,trc-1:secure,trc-2:secure
    expose:
      - "1338"
    restart: on-failure
    networks:
      - ehacking
    labels:
      - "traefik.enable=false"
      - "com.centurylinklabs.watchtower.enable=true"
    # links:
    #   - traefik:${SP_HOST}
    #   - traefik:${SPA_HOST}
    #   - traefik:${IDP_HOST}
    #   - traefik:${CATCHER_HOST}

  rookies:
    image: ghcr.io/ehacking-websec/rookies:latest
    pull_policy: always
    depends_on:
      - traefik
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.rookies.entrypoints=websecure"
      - "traefik.http.routers.rookies.rule=Host(`${ROOKIES_HOST}`)"
      - "traefik.http.services.rookies.loadbalancer.server.port=3000"
      - "traefik.http.routers.rookies.tls.certresolver=letsencrypt"
      - "com.centurylinklabs.watchtower.enable=true"
    restart: on-failure
    networks:
      - ehacking

  # Passkeys
  passkeys-app:
    image: ghcr.io/ehacking-websec/fun-with-flags-and-passkeys:latest
    restart: on-failure
    pull_policy: always
    networks:
      - ehacking
    depends_on:
      - traefik
      - passkeys-mongo
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.passkeys.entrypoints=websecure"
      - "traefik.http.routers.passkeys.rule=Host(`${PASSKEYS_HOST}`)"
      - "traefik.http.services.passkeys.loadbalancer.server.port=3000"
      - "traefik.http.routers.passkeys.tls.certresolver=letsencrypt"
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - passkeys-instance-data:/app/data/instances
    environment:
      - NODE_ENV=production
      - SESSION_SECRET=${PASSKEYS_SESSION_SECRET}
      - RP_ID=${PASSKEYS_RP_ID}
      - ORIGIN=${PASSKEYS_ORIGIN}
      - USE_MONGO=true
      - MONGO_URI=mongodb://passkeys-mongo:27017/funwithflags

  passkeys-mongo:
    image: mongo:4
    restart: on-failure
    networks:
      - ehacking
    volumes:
      - passkeys-mongo-data:/data/db

  # Crawling Maze
  crawling-maze:
    image: ghcr.io/ehacking-websec/crawling-maze:latest
    restart: on-failure
    pull_policy: always
    networks:
      - ehacking
    expose:
      - "8080"
    depends_on:
      - traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.crawling-maze.entrypoints=websecure"
      - "traefik.http.routers.crawling-maze.rule=Host(`${CRAWLING_MAZE_HOST}`)"
      - "traefik.http.routers.crawling-maze.tls.certresolver=letsencrypt"
      - "traefik.http.services.crawling-maze.loadbalancer.server.port=8080"
      - "com.centurylinklabs.watchtower.enable=true"
    volumes:
      - crawling-maze-sessions:/var/lib/crawling-maze/sessions
    environment:
      - FLASK_SECRET_KEY=secret
    env_file:
      - flags_crawling-maze.env

# Recruiting platform
  recruiting-challenge:
    image: ghcr.io/ehacking-websec/recruiting/challenge:latest
    pull_policy: always
    depends_on:
      traefik:
        required: true
        condition: service_started
    environment:
      PORT: "3000"
      REGISTRY_DB_PATH: /data/registry.db
      URL_STYLE: subdomain
      BOT_INTERNAL_SECRET: ${BOT_INTERNAL_SECRET:-bot-secret-11cde19f9d2f5b99-change-me-in-prod}
      BOT_PUBLIC_ORIGIN: https://${RECRUITING_BOT_HOST}
      CHALLENGE_PUBLIC_ORIGIN: https://${RECRUITING_CHALLENGE_HOST}
    volumes:
      - recruiting-data:/data
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.recruiting-challenge.entrypoints=websecure"
      - "traefik.http.routers.recruiting-challenge.rule=Host(`${RECRUITING_CHALLENGE_HOST}`) || HostRegexp(`^.+\\.${RECRUITING_CHALLENGE_HOST}$$`)"
      - "traefik.http.routers.recruiting-challenge.tls=true"
      - "traefik.http.routers.recruiting-challenge.tls.certresolver=letsencrypt"
      - "traefik.http.routers.recruiting-challenge.tls.domains[0].main=${RECRUITING_TIER_HOST}"
      - "traefik.http.routers.recruiting-challenge.tls.domains[0].sans=*.${RECRUITING_TIER_HOST},*.${RECRUITING_CHALLENGE_HOST}"
      - "traefik.http.services.recruiting-challenge.loadbalancer.server.port=3000"
    restart: on-failure
    networks:
      - ehacking

  recruiting-bot:
    image: ghcr.io/ehacking-websec/recruiting/bot:latest
    pull_policy: always
    init: true
    depends_on:
      traefik:
        required: true
        condition: service_started
      recruiting-challenge:
        required: true
        condition: service_started
    environment:
      PORT: "1337"
      REGISTRY_DB_PATH: /data/registry.db
      CHALLENGE_PUBLIC_ORIGIN: https://${RECRUITING_CHALLENGE_HOST}
      CHALLENGE_INTERNAL_ORIGIN: http://recruiting-challenge:3000
      BOT_INTERNAL_SECRET: ${BOT_INTERNAL_SECRET:-bot-secret-11cde19f9d2f5b99-change-me-in-prod}
      BOT_PUBLIC_ORIGIN: https://${RECRUITING_BOT_HOST}
      BOT_REPORT_RATE_LIMIT: "2"
    volumes:
      - recruiting-data:/data
    # Puppeteer + Firefox is the heaviest piece — cap RAM so a stuck
    # browser can't crowd the host and cpus so bursty reports don't
    # starve challenge + instructor.
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: "0.5"
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.recruiting-bot.entrypoints=websecure"
      - "traefik.http.routers.recruiting-bot.rule=Host(`${RECRUITING_BOT_HOST}`)"
      - "traefik.http.routers.recruiting-bot.tls=true"
      - "traefik.http.routers.recruiting-bot.tls.certresolver=letsencrypt"
      - "traefik.http.services.recruiting-bot.loadbalancer.server.port=1337"
    restart: on-failure
    networks:
      - ehacking

  recruiting-instructor:
    image: ghcr.io/ehacking-websec/recruiting/instructor:latest
    pull_policy: always
    depends_on:
      traefik:
        required: true
        condition: service_started
      recruiting-challenge:
        required: true
        condition: service_started
    environment:
      PORT: "3000"
      REGISTRY_DB_PATH: /data/registry.db
      URL_STYLE: subdomain
      CHALLENGE_PUBLIC_ORIGIN: https://${RECRUITING_CHALLENGE_HOST}
      BOT_PUBLIC_ORIGIN: https://${RECRUITING_BOT_HOST}
    volumes:
      - recruiting-data:/data
    labels:
      - "traefik.enable=true"
      - "com.centurylinklabs.watchtower.enable=true"
      - "traefik.http.routers.recruiting-instructor.entrypoints=websecure"
      - "traefik.http.routers.recruiting-instructor.rule=Host(`${RECRUITING_INSTRUCTOR_HOST}`)"
      - "traefik.http.routers.recruiting-instructor.tls=true"
      - "traefik.http.routers.recruiting-instructor.tls.certresolver=letsencrypt"
      - "traefik.http.routers.recruiting-instructor.middlewares=basicauth@file"
      - "traefik.http.services.recruiting-instructor.loadbalancer.server.port=3000"
    restart: on-failure
    networks:
      - ehacking

  # Watchtower
  watchtower:
    image: docker.io/nickfedor/watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - TZ=Europe/Berlin
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_INCLUDE_RESTARTING=true
      # - WATCHTOWER_RUN_ONCE=true
      # Field name   | Mandatory? | Allowed values  | Allowed special characters
      # ----------   | ---------- | --------------  | --------------------------
      # Seconds      | Yes        | 0-59            | * / , -
      # Minutes      | Yes        | 0-59            | * / , -
      # Hours        | Yes        | 0-23            | * / , -
      # Day of month | Yes        | 1-31            | * / , - ?
      # Month        | Yes        | 1-12 or JAN-DEC | * / , -
      # Day of week  | Yes        | 0-6 or SUN-SAT  | * / , - ?
      - WATCHTOWER_SCHEDULE=0 0 7 * * * # every day on 7am
    labels:
      - "com.centurylinklabs.watchtower.enable=true"
    restart: on-failure

networks:
  ehacking:
  soap-internal:

volumes:
  catcher-data:
  crawling-maze-sessions:
  letsencrypt:
  passkeys-instance-data:
  passkeys-mongo-data:
  recruiting-data:
